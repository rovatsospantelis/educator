<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- No-flash theme (πριν φορτώσει η εφαρμογή) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          if (t === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>

    <!-- Fonts: άλλαξε ανά project -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- SEO defaults (per-page overrides via useHead) -->
    <title>Brand Name — Tagline</title>
    <meta name="description" content="Default description ~150 chars." />
    <meta property="og:title" content="Brand Name" />
    <meta property="og:description" content="Default description." />
    <meta property="og:image" content="https://example.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Brand Name" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://example.com/og-image.png" />

    <!-- Google Analytics (βάλε το ID — αλλιώς δεν φορτώνει) -->
    <!--

        gtag('js', new Date())
        gtag('config', 'G-XXXXXXXXXX', { send_page_view: false })
      }
    </script>
    -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
